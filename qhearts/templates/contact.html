<!-- contact.html -->
{% extends 'base.html' %}
{% block content %}
<div id="contact-section">
    <h2>Contact Us</h2>
    <form action="{% url 'contact' %}" method="post">
        {% csrf_token %}
        {% for field in form %}
        <div class="form-group">
            {{ field.label_tag }}
            {{ field }}
            {% if field.errors %}
            <div class="errors">
                {{ field.errors }}
            </div>
            {% endif %}
        </div>
        {% endfor %}
        <div class="form-group">
            <input type="submit" value="Submit">
        </div>
    </form>
</div>
{% endblock %}
