<!-- templates/base.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QHearts</title>

    {% load static %} 

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background-color: #f9f9f9; 
        }
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 20px;
            background-color: #333; 
            color: #fff; 
        }
        .logo {
            font-size: 24px;
            font-weight: bold;
        }
        .buttons {
            display: flex;
            gap: 20px;
        }
        .button {
            padding: 10px 15px;
            border-radius: 5px;
            background-color: #555; 
            color: #fff; 
            cursor: pointer;
        }
        .contact-button {
            background-color: #ff6347; 
        }
        .contact-form {
            margin-top: 50px;
            padding: 20px;
            background-color: #fff;
            border-radius: 10px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        .form-group label {
            display: block;
            font-weight: bold;
        }
        .form-group input[type="text"],
        .form-group input[type="email"],
        .form-group textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }
        .form-group textarea {
            height: 150px;
        }
        .form-group input[type="submit"] {
            padding: 10px 20px;
            background-color: #555;
            color: #fff;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <nav>
        <div class="logo">
            <img src="{% static 'logo.png' %}" alt="Logo"> 
        </div>
        <div class="buttons">
            <a href="#about"><div class="button">About Us</div></a>
            <a href="#adopt"><div class="button">Adopt</div></a>
            <a href="#report"><div class="button">Report a Rescue</div></a>
        </div>
        <a href="#contact" class="button contact-button">Contact Us</a>
    </nav>
    
    <!--landing page content -->

   

</body>
</html>
